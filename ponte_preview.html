<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Preview — Elevação Longitudinal Ponte Graúna-Gaivotas</title>
<style>
  body { margin:20px; background:#f0eff8; font-family:'Segoe UI',sans-serif; }
  h2 { font-size:13px; color:#28156E; margin-bottom:10px; }
  .wrap { background:#fff; border-radius:10px; padding:18px 14px 14px;
          box-shadow:0 2px 8px rgba(0,0,0,.12); overflow-x:auto; }
  .leg { display:flex; flex-wrap:wrap; gap:16px; margin-top:12px; font-size:11px; color:#475569; }
  .leg-i { display:flex; align-items:center; gap:6px; }
  .leg-b { width:14px; height:9px; border-radius:2px; flex-shrink:0; }
  p.nota { font-size:10px; color:#94A3B8; margin-top:8px; }
</style>
</head>
<body>

<h2>ELEVAÇÃO LONGITUDINAL — PONTE GRAÚNA-GAIVOTAS &nbsp;·&nbsp; Preview &nbsp;·&nbsp; 12/05/2026</h2>

<div class="wrap">
  <svg id="svg" viewBox="0 0 1440 145" xmlns="http://www.w3.org/2000/svg"
       style="width:100%;min-width:1100px;height:auto;display:block"></svg>
</div>

<div class="leg">
  <div class="leg-i"><div class="leg-b" style="background:#16A34A"></div>Concluído</div>
  <div class="leg-i"><div class="leg-b" style="background:#F59E0B"></div>Em andamento</div>
  <div class="leg-i"><div class="leg-b" style="background:#94A3B8"></div>Não iniciado</div>
  <div class="leg-i"><div class="leg-b" style="background:#BFDBFE;border:1px solid #93C5FD"></div>Trecho em lâmina d'água</div>
  <div class="leg-i"><div class="leg-b" style="background:#D4A855"></div>Terra</div>
</div>
<p class="nota">
  Arquivo de validação. Representação esquemática — dois fustes por pilar (corte longitudinal). Cores por apoio inteiro.
</p>

<script>
'use strict';

// ── GEOMETRIA ─────────────────────────────────────────
const VW = 1440, VH = 145, MG = 44;
const SH = (VW - MG * 2) / 959.7; // px/m horizontal

const YDL  = 7;    // linha de cota
const YL   = 17;   // centro dos rótulos
const YDT  = 27;   // topo do tabuleiro
const YDB  = 34;   // base tabuleiro = topo travessa
const YTB  = 41;   // base travessa = topo pilar
const YPIB = 64;   // base pilar = topo bloco  (pilar = 23 px)
const YBKB = 73;   // base bloco = topo estacas (bloco = 9 px)
const YW   = 73;   // superfície d'água / terreno
const YEST = 127;  // ponta das estacas        (estaca = 54 px)

// ── DADOS ─────────────────────────────────────────────
const AP = [
  {id:'E1', m:0,     e:'enc', s:'a'},
  {id:'P1', m:29,    e:'pil', s:'c'},
  {id:'P2', m:70,    e:'pil', s:'c'},
  {id:'P3', m:111,   e:'pil', s:'a'},
  {id:'P4', m:152,   e:'pil', s:'a'},
  {id:'P5', m:193,   e:'pil', s:'a'},
  {id:'P6', m:234,   e:'pil', s:'a'},
  {id:'P7', m:275,   e:'pil', s:'a'},
  {id:'P8', m:316,   e:'pil', s:'a'},
  {id:'P9', m:357,   e:'pil', s:'a'},
  {id:'P10',m:398,   e:'pil', s:'n'},
  {id:'P11',m:439,   e:'pil', s:'n'},
  {id:'P12',m:480,   e:'pil', s:'n'},
  {id:'P13',m:521,   e:'pil', s:'n'},
  {id:'P14',m:562,   e:'pil', s:'n'},
  {id:'P15',m:603,   e:'pil', s:'n'},
  {id:'P16',m:644,   e:'pil', s:'n'},
  {id:'P17',m:685,   e:'pil', s:'n'},
  {id:'P18',m:726,   e:'pil', s:'n'},
  {id:'P19',m:767,   e:'pil', s:'n'},
  {id:'P20',m:808,   e:'pil', s:'n'},
  {id:'P21',m:849.3, e:'pil', s:'n'},
  {id:'P22',m:890.3, e:'pil', s:'n'},
  {id:'P23',m:931.6, e:'pil', s:'n'},
  {id:'E2', m:959.7, e:'enc', s:'n'},
];

const SPANS = [
  {i:0, j:1,  label:'29,0m'},
  {i:1, j:2,  label:'41,0m'},{i:2, j:3,  label:'41,0m'},{i:3, j:4,  label:'41,0m'},
  {i:4, j:5,  label:'41,0m'},{i:5, j:6,  label:'41,0m'},{i:6, j:7,  label:'41,0m'},
  {i:7, j:8,  label:'41,0m'},{i:8, j:9,  label:'41,0m'},{i:9, j:10, label:'41,0m'},
  {i:10,j:11, label:'41,0m'},{i:11,j:12, label:'41,0m'},{i:12,j:13, label:'41,0m'},
  {i:13,j:14, label:'41,0m'},{i:14,j:15, label:'41,0m'},{i:15,j:16, label:'41,0m'},
  {i:16,j:17, label:'41,0m'},{i:17,j:18, label:'41,0m'},{i:18,j:19, label:'41,0m'},
  {i:19,j:20, label:'41,0m'},{i:20,j:21, label:'41,3m'},{i:21,j:22, label:'41,0m'},
  {i:22,j:23, label:'41,3m'},{i:23,j:24, label:'28,1m'},
];

// ── HELPERS ───────────────────────────────────────────
const svg = document.getElementById('svg');
function X(ap){ return MG + ap.m * SH; }
function COR(s){ return s==='c'?'#16A34A': s==='a'?'#F59E0B':'#94A3B8'; }
function OPCOR(s){ return s==='n'?0.38:1; }
function el(tag,a){
  const n=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v]of Object.entries(a))n.setAttribute(k,v);
  return n;
}
const R =(x,y,w,h,a={})=>el('rect',{x,y,width:w,height:h,...a});
const L =(x1,y1,x2,y2,a={})=>el('line',{x1,y1,x2,y2,...a});
const Tx=(t,x,y,a={})=>{const n=el('text',{x,y,...a});n.textContent=t;return n;};

const xE1=X(AP[0]), xP3=X(AP[3]), xP20=X(AP[20]), xE2=X(AP[24]);

// ── 1. TALUDE ESQUERDO: inclina de (0,YTB) até (xP3,YW) ──
svg.appendChild(el('polygon',{
  points:`0,${YDB} ${xP3},${YW} ${xP3},${VH} 0,${VH}`,
  fill:'#D4A855', opacity:'0.88',
  stroke:'#B07820','stroke-width':'0.6',
}));

// ── 2. TALUDE DIREITO: inclina de (xP20,YW) até (VW,YTB) ─
svg.appendChild(el('polygon',{
  points:`${xP20},${YW} ${VW},${YDB} ${VW},${VH} ${xP20},${VH}`,
  fill:'#D4A855', opacity:'0.88',
  stroke:'#B07820','stroke-width':'0.6',
}));

// ── 3. ÁGUA (P3 → P20) ───────────────────────────────
svg.appendChild(R(xP3, YW, xP20-xP3, VH-YW, {fill:'#BFDBFE', opacity:'.55'}));

// ── 4. LABELS ─────────────────────────────────────────
svg.appendChild(Tx('Trecho em lâmina d\'água',(xP3+xP20)/2, YW+12, {
  'text-anchor':'middle','font-family':'Arial,sans-serif',
  'font-size':'7.5','font-weight':'600',
  fill:'#1E40AF', opacity:'.75', 'letter-spacing':'0.8',
}));
svg.appendChild(Tx('TERRA', xP3*0.42, YW+10, {
  'text-anchor':'middle','font-family':'Arial,sans-serif',
  'font-size':'7', fill:'#7C4F1E', opacity:'.8',
}));
svg.appendChild(Tx('TERRA', (xP20+VW)*0.5, YW+10, {
  'text-anchor':'middle','font-family':'Arial,sans-serif',
  'font-size':'7', fill:'#7C4F1E', opacity:'.8',
}));

// ── 5. LINHA DE COTA + TICKS ──────────────────────────
svg.appendChild(L(xE1, YDL, xE2, YDL,
  {stroke:'#475569','stroke-width':'.6',opacity:'.5'}));
AP.forEach(ap=>{
  const x=X(ap);
  svg.appendChild(L(x,YDL-3,x,YDL+3,
    {stroke:'#475569','stroke-width':'.6',opacity:'.5'}));
});

// ── 6. LABELS DOS VÃOS ────────────────────────────────
SPANS.forEach(sp=>{
  const x1=X(AP[sp.i]), x2=X(AP[sp.j]);
  svg.appendChild(Tx(sp.label,(x1+x2)/2,YDL-1.5,{
    'text-anchor':'middle','dominant-baseline':'auto',
    'font-family':'Arial,sans-serif','font-size':'5.5',
    fill:'#334155',opacity:'.75',
  }));
});

// ── 7. TABULEIRO (2 cordas espessas) ──────────────────
SPANS.forEach(sp=>{
  const x1=X(AP[sp.i]), x2=X(AP[sp.j]);
  svg.appendChild(R(x1,YDT,   x2-x1,3, {fill:'#475569',opacity:'.18',stroke:'none'}));
  svg.appendChild(R(x1,YDB-3, x2-x1,3, {fill:'#475569',opacity:'.18',stroke:'none'}));
});
svg.appendChild(L(xE1,YDT, xE2,YDT, {stroke:'#1e293b','stroke-width':'2.5',opacity:'.88'}));
svg.appendChild(L(xE1,YDB, xE2,YDB, {stroke:'#1e293b','stroke-width':'2.5',opacity:'.88'}));

// ── 8. APOIOS ─────────────────────────────────────────
AP.forEach(ap=>{
  const x  = X(ap);
  const c  = COR(ap.s);
  const op = OPCOR(ap.s);

  if(ap.e==='enc'){
    // Encontro: só travessa — talude global sustenta abaixo
    svg.appendChild(R(x-10, YDB, 20, YTB-YDB, {fill:c,opacity:op,rx:'1'}));
    for(const off of [-4.5,+1.5])
      svg.appendChild(R(x+off, YTB, 3.5, YEST-YTB, {fill:c,opacity:op,rx:'1'}));
    return;
  }

  // Pilar intermediário
  svg.appendChild(R(x-10, YDB,  20, YTB-YDB,  {fill:c,opacity:op,rx:'1'})); // travessa
  for(const off of [-4.5,+1.5])
    svg.appendChild(R(x+off, YTB, 3.5, YPIB-YTB, {fill:c,opacity:op}));      // fustes
  svg.appendChild(R(x-11, YPIB, 22, YBKB-YPIB, {fill:c,opacity:op,rx:'1.5'})); // bloco
  for(const off of [-4.5,+1.5])
    svg.appendChild(R(x+off, YBKB, 3.5, YEST-YBKB, {fill:c,opacity:op,rx:'1'})); // estacas
});

// ── 9. RÓTULOS DOS APOIOS ────────────────────────────
AP.forEach(ap=>{
  const x  = X(ap);
  const isE= ap.e==='enc';
  svg.appendChild(L(x, YL+8, x, YDT,
    {stroke:'#94A3B8','stroke-width':'.7','stroke-dasharray':'2,1.5',opacity:'.55'}));
  svg.appendChild(el('circle',{cx:x,cy:YL,r:isE?9.5:8.5,
    fill:'#fff',stroke:'#28156E','stroke-width':'1.2'}));
  svg.appendChild(Tx(ap.id,x,YL,{
    'text-anchor':'middle','dominant-baseline':'middle',
    'font-family':'Arial,sans-serif',
    'font-size':ap.id.length>2?'5.5':'6.5',
    'font-weight':'700',fill:'#28156E',
  }));
});
</script>
</body>
</html>
